<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>株式会社LSFP｜LP一覧</title>
  <meta name="robots" content="noindex">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.7; color: #1a1a1a; background: #f7f9f4;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 48px 20px; }
    h1 { font-size: 1.4rem; margin: 0 0 4px; }
    .sub { color: #5a6b4a; margin: 0 0 32px; font-size: .9rem; }
    ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
    a.card {
      display: block; padding: 18px 20px; background: #fff; border: 1px solid #cddeb5;
      border-radius: 12px; text-decoration: none; color: inherit;
    }
    a.card:hover { border-color: #9db877; }
    .card .name { font-weight: 700; }
    .card .path { color: #7a8a6a; font-size: .82rem; margin-top: 2px; }
    footer { margin-top: 40px; color: #9aa88a; font-size: .78rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>株式会社LSFP ランディングページ</h1>
    <p class="sub">一般公開LPの一覧</p>
    <ul>
      <li><a class="card" href="dc-taishoku/">
        <div class="name">DC退職金の受け取り方</div>
        <div class="path">/dc-taishoku/</div>
      </a></li>
      <li><a class="card" href="idecoplus/">
        <div class="name">iDeCo+</div>
        <div class="path">/idecoplus/</div>
      </a></li>
      <li><a class="card" href="dc-exit-course/">
        <div class="name">DC退職コンサルサポート実務講座</div>
        <div class="path">/dc-exit-course/</div>
      </a></li>
    </ul>
    <footer>© 株式会社LSFP</footer>
  </main>
</body>
</html>
